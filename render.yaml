# Render Blueprint for the WorkCrew backend.
# In Render, choose New, then Blueprint, and point it at this repository. Render
# reads this file and creates the service. Values marked sync: false must be
# pasted by you in the Render dashboard and are never stored in this file or in
# Git. WORKCREW_LOCAL_AUTH_SECRET is generated by Render automatically.
services:
  - type: web
    name: workcrew-backend
    runtime: node
    plan: starter
    rootDir: .
    buildCommand: npm install && npm run build -w @workcrew/contracts && npm run build -w @workcrew/api
    startCommand: node apps/api/dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: AUTH_MODE
        value: local
      - key: BILLING_MODE
        value: stripe
      - key: WORKCREW_ALLOWED_ORIGINS
        value: app://workcrew
      - key: WORKCREW_LOCAL_AUTH_SECRET
        generateValue: true
      # Persistent database (use a remote libSQL such as Turso, since the Render
      # disk is wiped on each deploy). Paste both in the dashboard.
      - key: WORKCREW_DATA_URL
        sync: false
      - key: WORKCREW_DATA_AUTH_TOKEN
        sync: false
      # Secrets, paste in the dashboard only.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_MONTHLY_PRICE_ID
        sync: false
      - key: STRIPE_PRO_YEARLY_PRICE_ID
        sync: false
      - key: STRIPE_ULTRA_MONTHLY_PRICE_ID
        sync: false
      - key: STRIPE_ULTRA_YEARLY_PRICE_ID
        sync: false
      # Public values, safe to paste in the dashboard.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
